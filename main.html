<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi">
    <title>DumbOS v9.5 (Clean)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📟</text></svg>">
    <style>
        :root {
            --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333;
            --font: 'Courier New', monospace; 
            --status-h: 24px; --soft-h: 30px; /* Taller bars */
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--fg);
            font-family: var(--font); font-size: 14px; /* Bigger base font */
            font-weight: bold; /* Make everything bolder */
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; user-select: none; touch-action: none;
        }
        /* Status Bar */
        .status-bar {
            height: var(--status-h); background: #111; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px; font-size: 12px; /* Bigger status text */
        }
        .bold { font-weight: bold; }

        /* Main View */
        .view { flex-grow: 1; overflow-y: auto; padding: 5px; }
        
        /* Search Box */
        .search-box { margin-bottom: 8px; padding: 2px; }
        #omni-box {
            width: 95%; background: #222; border: 1px solid #444; color: #fff;
            font-family: inherit; font-size: 16px; padding: 5px; border-radius: 4px;
        }
        #omni-box:focus { border-color: var(--highlight); outline: none; background: #000; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .app {
            display: flex; flex-direction: column; align-items: center; padding: 8px 2px;
            border: 1px solid transparent; text-decoration: none; color: inherit;
            border-radius: 4px; position: relative; cursor: pointer;
        }
        .app.active, .app:focus { background: var(--select); border-color: var(--highlight); outline: none; }
        .app-num { position: absolute; top: 2px; left: 2px; font-size: 10px; opacity: 0.7; }
        .icon { font-size: 32px; margin-bottom: 4px; } /* Bigger Icons */
        .name { font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; max-width: 100%; }

        /* Soft Keys */
        .soft-keys {
            height: var(--soft-h); background: #111; border-top: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px; font-size: 12px; text-transform: uppercase; font-weight: bold;
        }
        .soft-key { width: 33%; text-align: center; cursor: pointer; }
    </style>
</head>
<body class="theme-default">

    <div class="status-bar">
        <span id="carrier">Hi Gulliklckson!</span>
        <div class="status-right">
            <span id="battery">🔋??%</span>
            <span id="clock" class="bold">--:--</span>
        </div>
    </div>

    <div class="view">
        <div class="search-box">
            <input type="text" id="omni-box" placeholder="Search..." tabindex="0">
        </div>
        <div class="grid" id="app-grid"></div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left">Options</div>
        <div class="soft-key center" onclick="handleCenterKey()">OPEN</div>
        <div class="soft-key right">Back</div>
    </div>

    <script>
        const APPS = [
            { url: "notes.html", icon: "📝", name: "Notepad", isInternal: false },
            { url: "todo.html", icon: "✅", name: "Todo", isInternal: false },
            { url: "chat.html", icon: "💬", name: "ChatBot", isInternal: false },
            { url: "weather.html", icon: "☁️", name: "Weather", isInternal: false },
            { url: "news.html", icon: "📰", name: "News", isInternal: false },
            { url: "stocks.html", icon: "📈", name: "Stocks", isInternal: false },
            { url: "radio.html", icon: "📻", name: "Radio", isInternal: false },
            { url: "recorder.html", icon: "🎙️", name: "Recorder", isInternal: false },
            { url: "timer.html", icon: "⏱️", name: "Timer", isInternal: false },
            { url: "reader.html", icon: "📚", name: "Reader", isInternal: false },
            { url: "maps.html", icon: "🗺️", name: "Maps", isInternal: false },
            { url: "qr.html", icon: "🔳", name: "QR Gen", isInternal: false },
            { url: "settings.html", icon: "⚙️", name: "Settings", isInternal: false },
            { url: "games/index.html", icon: "👾", name: "Arcade", isInternal: false },
            { url: "http://frogfind.com", icon: "🐸", name: "FrogFind" },
            { url: "https://lite.duckduckgo.com/lite", icon: "🦆", name: "DDG Lite" },
            { url: "https://wiby.me", icon: "🕸️", name: "Wiby" },
            { url: "https://old.reddit.com", icon: "👽", name: "Reddit" },
            { url: "https://news.ycombinator.com", icon: "👾", name: "HackerN" },
            { url: "https://mbasic.facebook.com", icon: "👥", name: "FB Basic" },
            { url: "https://mobile.twitter.com", icon: "🐦", name: "Twitter" },
            { url: "https://text.npr.org", icon: "📰", name: "NPR Txt" },
            { url: "https://lite.cnn.com", icon: "🗞️", name: "CNN Lite" },
            { url: "https://wttr.in", icon: "☁️", name: "Weather" },
            { url: "https://en.m.wikipedia.org", icon: "📚", name: "Wiki" },
            { url: "https://maps.google.com", icon: "🗺️", name: "Maps" },
            { url: "https://translate.google.com/m", icon: "🈯", name: "Translat" },
            { url: "https://gmail.com", icon: "✉️", name: "Gmail" },
            { url: "https://github.com", icon: "🐙", name: "GitHub" }
        ];

        function init() {
            const grid = document.getElementById('app-grid');
            APPS.forEach((app, i) => {
                const el = document.createElement('a');
                el.href = app.url;
                el.className = 'app';
                el.tabIndex = i + 1; 
                el.innerHTML = `
                    <span class="app-num">${i+1}</span>
                    <span class="icon">${app.icon}</span>
                    <span class="name">${app.name}</span>
                `;
                grid.appendChild(el);
            });
            updateTime(); setInterval(updateTime, 1000);
            setFocus(-1);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        // Navigation
        let focusIdx = -1;
        const apps = document.getElementsByClassName('app');
        const omni = document.getElementById('omni-box');

        function setFocus(idx) {
            Array.from(apps).forEach(a => a.classList.remove('active'));
            omni.blur();
            if (idx < 0) {
                focusIdx = -1; omni.focus();
                document.querySelector('.soft-key.center').innerText = "SEARCH";
            } else {
                focusIdx = idx;
                apps[focusIdx].classList.add('active');
                apps[focusIdx].focus();
                document.querySelector('.soft-key.center').innerText = "OPEN";
            }
        }

        function handleCenterKey() {
            if (focusIdx === -1) {
                if(omni.value.trim()) window.location = `https://www.google.com/search?q=${encodeURIComponent(omni.value)}`;
            } else {
                apps[focusIdx].click();
            }
        }

        document.addEventListener('keydown', (e) => {
            const k = e.key;
            if (k === 'ArrowDown') {
                if (focusIdx === -1) setFocus(0);
                else if (focusIdx + 3 < apps.length) setFocus(focusIdx + 3);
                e.preventDefault();
            } 
            else if (k === 'ArrowUp') {
                if (focusIdx < 3) setFocus(-1);
                else setFocus(focusIdx - 3);
                e.preventDefault();
            }
            else if (k === 'ArrowRight') {
                if (focusIdx !== -1 && (focusIdx + 1) % 3 !== 0) setFocus(focusIdx + 1);
            }
            else if (k === 'ArrowLeft') {
                if (focusIdx !== -1 && focusIdx % 3 !== 0) setFocus(focusIdx - 1);
            }
            else if (k === 'Enter') handleCenterKey();
            else if (k >= '1' && k <= '9' && document.activeElement !== omni) {
                if(apps[k-1]) apps[k-1].click();
            }
        });

        init();
    </script>
</body>
</html>
