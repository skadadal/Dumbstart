<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS v9 (Clean Dashboard)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📟</text></svg>">
    <style>
        :root {
            --bg: #000;
            --fg: #e0e0e0;
            --highlight: #0f0;
            --select: #333;
            --font: 'Courier New', monospace;
            --status-h: 18px;
            --soft-h: 24px;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg); color: var(--fg);
            font-family: var(--font);
            font-size: 11px;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Themes */
        body.red { --highlight: #ff0000; --select: #500; --bg: #200; }
        body.green { --highlight: #00ff00; --select: #050; --bg: #020; }
        body.amber { --highlight: #ffaa00; --select: #530; --bg: #210; }
        body.blue { --highlight: #00ccff; --select: #003; --bg: #001; }

        /* Status Bar */
        .status-bar {
            height: var(--status-h);
            background: #111;
            border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
            font-size: 10px;
        }
        .bold { font-weight: bold; }

        /* Main View */
        .view {
            flex-grow: 1;
            overflow-y: auto; /* Scrollable grid */
            padding: 4px;
            display: none; /* Hide non-active views */
        }
        .view.active { display: block; }

        /* Search Box */
        .search-box {
            margin-bottom: 5px;
            padding: 2px;
        }
        #omni-box {
            width: 96%;
            background: #222; border: 1px solid #444; color: #fff;
            font-family: inherit; font-size: 12px; padding: 2px 4px;
            border-radius: 4px;
        }
        #omni-box:focus { border-color: var(--highlight); outline: none; background: #000; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .app {
            display: flex; flex-direction: column; align-items: center;
            padding: 6px 2px;
            border: 1px solid transparent;
            text-decoration: none; color: inherit;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .app.active, .app:focus {
            background: var(--select);
            border-color: var(--highlight);
            color: #fff; outline: none;
        }
        .app-num {
            position: absolute; top: 1px; left: 1px;
            font-size: 8px; opacity: 0.5;
        }
        .icon { font-size: 20px; margin-bottom: 2px; }
        .name { font-size: 10px; text-align: center; white-space: nowrap; overflow: hidden; max-width: 100%; }

        /* Soft Keys (Toolbar) */
        .soft-keys {
            height: var(--soft-h);
            background: #111;
            border-top: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
            font-size: 10px;
            text-transform: uppercase;
        }
        .soft-key { width: 33%; text-align: center; cursor: pointer; }
        .left { text-align: left; }
        .right { text-align: right; }
        .center { font-weight: bold; }

        /* Popups */
        .popup {
            position: absolute; bottom: var(--soft-h); left: 0; right: 0;
            background: #222; border-top: 2px solid var(--highlight);
            z-index: 100;
        }
        .popup-title {
            background: var(--highlight); color: #000;
            padding: 2px 5px; font-weight: bold; text-align: center;
        }
        .menu-list { padding: 5px; }
        .menu-item { padding: 8px 5px; border-bottom: 1px solid #444; cursor: pointer; }
        .menu-item:hover, .menu-item.active { background: var(--select); color: #fff; }
        .hidden { display: none !important; }

        /* --- GAME STYLES --- */
        .game-score-box { font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        
        /* CALC */
        #view-calc { text-align: center; padding-top: 20px; }
        .game-display {
            font-size: 24px; font-weight: bold; margin-bottom: 20px;
            border: 2px solid var(--highlight); padding: 10px;
            background: #111;
        }
        .game-input {
            width: 80%; background: #222; border: 1px solid #555;
            color: #fff; font-size: 18px; padding: 5px; text-align: center;
        }

        /* PIXEL SIMON */
        #view-pixel {
            display: flex; flex-direction: column; align-items: center;
            height: 100%;
        }
        .pixel-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 5px; width: 80%; aspect-ratio: 1/1; margin-top: 20px;
        }
        .pixel-btn {
            background: #222; border: 2px solid #444; border-radius: 5px;
            cursor: pointer; transition: background 0.1s;
        }
        .pixel-btn.lit { background: var(--highlight); border-color: #fff; box-shadow: 0 0 10px var(--highlight); }
        .pixel-btn.fail { background: red !important; }

        /* GOLF */
        #view-golf {
            display: flex; flex-direction: column; align-items: center;
            height: 100%; font-family: monospace;
        }
        .golf-course {
            display: grid; grid-template-columns: repeat(10, 1fr);
            gap: 1px; background: #050; border: 2px solid #fff;
            width: 90%; aspect-ratio: 1/1; margin-top: 10px;
        }
        .tile {
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff;
        }
        .tile.grass { background: #131; color: #262; }
        .tile.sand { background: #cca; color: #aa8; }
        .tile.water { background: #00f; color: #aaf; }
        .tile.hole { background: #000; color: #fff; font-weight: bold; border: 1px solid #fff; border-radius: 50%; }
        .tile.ball { background: #fff; border-radius: 50%; color: #000; font-weight: bold; z-index: 10; }
        
        .golf-ui { width: 90%; margin-top: 10px; font-size: 11px; }
        .power-bar {
            width: 100%; height: 10px; background: #333; margin-top: 5px;
            position: relative; border: 1px solid #555;
        }
        .power-fill {
            height: 100%; width: 0%; background: var(--highlight);
            transition: width 0.1s linear;
        }
        .power-marker {
            position: absolute; top: 0; bottom: 0; width: 2px; background: #fff;
            left: 0%;
        }

        /* GAMES MENU */
        #view-games-menu h2 {
            margin: 5px 0 10px 0; text-align: center; border-bottom: 1px solid #333;
        }

    </style>
</head>
<body class="theme-default">

    <!-- Status Bar (Always Visible) -->
    <div class="status-bar">
        <span id="carrier">Hi Gulliklckson!</span>
        <div class="status-right">
            <span id="battery">🔋??%</span>
            <span id="clock" class="bold">--:--</span>
        </div>
    </div>

    <!-- VIEW 1: HOME (App Grid) -->
    <div id="view-home" class="view active">
        <div class="search-box">
            <input type="text" id="omni-box" placeholder="Search..." tabindex="0">
        </div>
        <div class="grid" id="app-grid">
            <!-- Apps injected by JS -->
        </div>
    </div>

    <!-- VIEW 1.5: GAMES MENU -->
    <div id="view-games-menu" class="view">
        <h2>👾 Arcade</h2>
        <div class="grid" id="games-grid">
            <!-- Game Apps injected here -->
        </div>
    </div>

    <!-- VIEW 2: CALC GAME -->
    <div id="view-calc" class="view">
        <div class="game-score-box">Score: <span id="g-score">0</span></div>
        <div class="game-display" id="g-problem">READY?</div>
        <input type="tel" id="g-input" class="game-input" placeholder="?">
        <div class="game-msg" id="g-msg"></div>
    </div>

    <!-- VIEW 3: PIXEL SIMON -->
    <div id="view-pixel" class="view">
        <div class="game-score-box">Level: <span id="p-level">1</span></div>
        <div id="p-status" style="height:20px; color:#888;">Watch sequence...</div>
        <div class="pixel-grid" id="pixel-grid"></div>
    </div>

    <!-- VIEW 4: DUMB GOLF -->
    <div id="view-golf" class="view">
        <div class="game-score-box">
            Hole: <span id="gf-hole">1</span> | Par: 3 | Strokes: <span id="gf-strokes">0</span>
        </div>
        <div class="golf-course" id="golf-grid">
            <!-- 10x10 Grid -->
        </div>
        <div class="golf-ui">
            <div>Angle: <span id="gf-angle">0</span>&deg; <span id="gf-msg"></span></div>
            <div class="power-bar">
                <div id="gf-power-fill" class="power-fill"></div>
                <div id="gf-power-marker" class="power-marker"></div>
            </div>
            <div style="font-size:9px; margin-top:2px;">Hold CENTER to Swing!</div>
        </div>
    </div>

    <!-- Soft Keys -->
    <div class="soft-keys">
        <div class="soft-key left" id="sk-left" onclick="handleLeftKey()">Options</div>
        <div class="soft-key center" id="sk-center" onclick="handleCenterKey()">SELECT</div>
        <div class="soft-key right" id="sk-right" onclick="handleRightKey()">Back</div>
    </div>

    <!-- Options Menu -->
    <div id="options-menu" class="popup hidden">
        <div class="popup-title">Options</div>
        <div class="menu-list">
            <div class="menu-item" onclick="cycleTheme()">🎨 Change Theme</div>
            <div class="menu-item" onclick="toggleOptions()">❌ Close Menu</div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const MAIN_APPS = [
            { url: "games/index.html", icon: "👾", name: "Arcade", isInternal: false }, // LINK TO SUB-INDEX
            { url: "http://frogfind.com", icon: "🐸", name: "FrogFind" },
            { url: "https://lite.duckduckgo.com/lite", icon: "🦆", name: "DDG Lite" },
            { url: "https://wiby.me", icon: "🕸️", name: "Wiby" },
            { url: "https://old.reddit.com", icon: "👽", name: "Reddit" },
            { url: "https://news.ycombinator.com", icon: "👾", name: "HackerN" },
            { url: "https://mbasic.facebook.com", icon: "👥", name: "FB Basic" },
            { url: "https://mobile.twitter.com", icon: "🐦", name: "Twitter" },
            { url: "https://text.npr.org", icon: "📰", name: "NPR Txt" },
            { url: "https://lite.cnn.com", icon: "🗞️", name: "CNN Lite" },
            { url: "https://wttr.in", icon: "☁️", name: "Weather" },
            { url: "https://en.m.wikipedia.org", icon: "📚", name: "Wiki" },
            { url: "https://maps.google.com", icon: "🗺️", name: "Maps" },
            { url: "https://translate.google.com/m", icon: "🈯", name: "Translat" },
            { url: "https://gmail.com", icon: "✉️", name: "Gmail" },
            { url: "https://github.com", icon: "🐙", name: "GitHub" }
        ];

        const GAME_APPS = [
            { id: "calcgame", icon: "🧮", name: "CalcGame", isInternal: true },
            { id: "pixelsimon", icon: "🧠", name: "PixelSimon", isInternal: true },
            { id: "dumbgolf", icon: "⛳️", name: "DumbGolf", isInternal: true }
        ];

        const THEMES = ['default', 'red', 'green', 'amber', 'blue'];
        let currentTheme = localStorage.getItem('dumbos-theme') || 'default';
        document.body.className = currentTheme;

        // --- DOM ---
        const grid = document.getElementById('app-grid');
        const gamesGrid = document.getElementById('games-grid');
        const omni = document.getElementById('omni-box');
        const optionsMenu = document.getElementById('options-menu');
        
        // Views
        const views = {
            home: document.getElementById('view-home'),
            games: document.getElementById('view-games-menu'),
            calc: document.getElementById('view-calc'),
            pixel: document.getElementById('view-pixel'),
            golf: document.getElementById('view-golf')
        };
        let currentView = 'home';

        // --- INIT ---
        function init() {
            // Build Main Grid
            renderGrid(grid, MAIN_APPS);
            
            // Build Games Grid
            renderGrid(gamesGrid, GAME_APPS);

            // Build Pixel Grid
            const pGrid = document.getElementById('pixel-grid');
            for(let i=0; i<9; i++) {
                const btn = document.createElement('div');
                btn.className = 'pixel-btn';
                btn.id = `px-${i}`;
                btn.onclick = () => handlePixelInput(i);
                pGrid.appendChild(btn);
            }

            // Build Golf Grid (10x10)
            const gGrid = document.getElementById('golf-grid');
            for(let i=0; i<100; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile grass';
                tile.id = `gf-${i}`;
                gGrid.appendChild(tile);
            }

            updateTime();
            setInterval(updateTime, 1000);
            setFocus(-1);
        }

        function renderGrid(container, items) {
            items.forEach((app, i) => {
                const el = document.createElement('a');
                if(!app.isInternal) el.href = app.url;
                else el.onclick = () => openApp(app.id); 
                
                el.className = 'app';
                el.tabIndex = i + 1; 
                el.innerHTML = `
                    <span class="app-num">${i+1}</span>
                    <span class="icon">${app.icon}</span>
                    <span class="name">${app.name}</span>
                `;
                container.appendChild(el);
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        // --- NAVIGATION ---
        let focusIdx = -1; 
        const cols = 3;

        function getActiveGridApps() {
            if(currentView === 'home') return document.querySelectorAll('#app-grid .app');
            if(currentView === 'games') return document.querySelectorAll('#games-grid .app');
            return [];
        }

        function setFocus(idx) {
            const apps = getActiveGridApps();
            if(apps.length === 0) return;

            apps.forEach(a => a.classList.remove('active'));
            omni.blur();

            if (idx < 0 && currentView === 'home') {
                focusIdx = -1;
                omni.focus();
                updateSoftKeys("Options", "SEARCH", "Back");
            } else {
                focusIdx = Math.max(0, Math.min(idx, apps.length - 1)); // Clamp
                if(apps[focusIdx]) {
                    apps[focusIdx].classList.add('active');
                    apps[focusIdx].focus();
                    updateSoftKeys("Options", "OPEN", "Back");
                }
            }
        }

        function updateSoftKeys(left, center, right) {
            document.getElementById('sk-left').textContent = left;
            document.getElementById('sk-center').textContent = center;
            document.getElementById('sk-right').textContent = right;
        }

        function switchView(viewName) {
            Object.values(views).forEach(v => {
                v.classList.remove('active');
                v.style.display = 'none';
            });
            const v = views[viewName];
            v.classList.add('active');
            v.style.display = (viewName === 'pixel' || viewName === 'golf') ? 'flex' : 'block';
            currentView = viewName;

            if(viewName === 'home') {
                updateSoftKeys("Options", "OPEN", "Back");
                setFocus(focusIdx); // Restore focus
            } else if (viewName === 'games') {
                updateSoftKeys("Options", "OPEN", "Back");
                setFocus(0); // Focus first game
            } else if (viewName === 'calc') {
                updateSoftKeys("Reset", "SUBMIT", "Quit");
                initCalcGame();
            } else if (viewName === 'pixel') {
                updateSoftKeys("Start", "TAP!", "Quit");
                initPixelGame();
            } else if (viewName === 'golf') {
                updateSoftKeys("Reset", "SWING", "Quit");
                initGolfGame();
            }
        }

        function openApp(id) {
            if (id === 'gamesmenu') switchView('games');
            if (id === 'calcgame') switchView('calc');
            if (id === 'pixelsimon') switchView('pixel');
            if (id === 'dumbgolf') switchView('golf');
        }

        // --- ACTIONS ---
        function handleLeftKey() {
            if (currentView === 'home' || currentView === 'games') toggleOptions();
            else if (currentView === 'calc') initCalcGame();
            else if (currentView === 'pixel') startSimonRound();
            else if (currentView === 'golf') initGolfGame();
        }

        function handleCenterKey() {
            if (currentView === 'home' || currentView === 'games') {
                if (currentView === 'home' && focusIdx === -1) {
                    if(omni.value.trim() !== "") window.location = `https://www.google.com/search?q=${encodeURIComponent(omni.value)}`;
                } else {
                    const apps = getActiveGridApps();
                    const appData = (currentView === 'home' ? MAIN_APPS : GAME_APPS)[focusIdx];
                    
                    if(appData) {
                        if(appData.isInternal) openApp(appData.id);
                        else window.location = appData.url;
                    }
                }
            } else if (currentView === 'calc') {
                checkCalcAnswer();
            } else if (currentView === 'pixel') {
                handlePixelInput(4);
            } else if (currentView === 'golf') {
                startSwing();
            }
        }

        function handleCenterKeyRelease() {
            if (currentView === 'golf') releaseSwing();
        }

        function handleRightKey() {
            if (currentView === 'games') switchView('home');
            else if (currentView !== 'home' && currentView !== 'games') switchView('games'); // Back to games menu
            else history.back();
        }

        function toggleOptions() {
            optionsMenu.classList.toggle('hidden');
        }

        function cycleTheme() {
            let idx = THEMES.indexOf(currentTheme);
            idx = (idx + 1) % THEMES.length;
            currentTheme = THEMES[idx];
            document.body.className = currentTheme;
            localStorage.setItem('dumbos-theme', currentTheme);
        }

        // --- GAME LOGIC (Minified for space) ---
        // CALC
        let gScore=0,gAnswer=0;
        function initCalcGame(){gScore=0;document.getElementById('g-score').innerText=0;document.getElementById('g-msg').innerText="";nextCalcProblem();document.getElementById('g-input').focus();}
        function nextCalcProblem(){const op=Math.random()>.5?'+':'-';const a=Math.floor(Math.random()*20)+1;const b=Math.floor(Math.random()*20)+1;let n1=a,n2=b;if(op==='-'&&a<b){n1=b;n2=a;}gAnswer=(op==='+')?n1+n2:n1-n2;document.getElementById('g-problem').innerText=`${n1} ${op} ${n2} = ?`;document.getElementById('g-input').value="";}
        function checkCalcAnswer(){const v=parseInt(document.getElementById('g-input').value);const m=document.getElementById('g-msg');if(v===gAnswer){gScore+=10;m.innerText="CORRECT!";m.style.color="var(--highlight)";document.getElementById('g-score').innerText=gScore;setTimeout(()=>{m.innerText="";nextCalcProblem()},500);}else{gScore=Math.max(0,gScore-5);m.innerText="WRONG!";m.style.color="red";document.getElementById('g-score').innerText=gScore;}document.getElementById('g-input').focus();}

        // PIXEL
        let simonSeq=[],playerSeq=[],simonLevel=1,simonPlaying=false,inputEnabled=false;
        function initPixelGame(){simonSeq=[];simonLevel=1;document.getElementById('p-level').innerText=1;document.getElementById('p-status').innerText="Press Start Option";clearPixels();}
        function stopPixelGame(){simonSeq=[];clearPixels();}
        function startSimonRound(){if(simonPlaying)return;playerSeq=[];inputEnabled=false;document.getElementById('p-status').innerText="Watch...";simonSeq.push(Math.floor(Math.random()*9));playSequence();}
        function playSequence(){simonPlaying=true;let i=0;const int=setInterval(()=>{if(i>=simonSeq.length){clearInterval(int);simonPlaying=false;inputEnabled=true;document.getElementById('p-status').innerText="Your Turn!";return;}flashPixel(simonSeq[i]);i++;},600);}
        function flashPixel(i){const b=document.getElementById(`px-${i}`);b.classList.add('lit');setTimeout(()=>b.classList.remove('lit'),300);}
        function handlePixelInput(i){if(!inputEnabled)return;const b=document.getElementById(`px-${i}`);b.classList.add('lit');setTimeout(()=>b.classList.remove('lit'),200);if(i===simonSeq[playerSeq.length]){playerSeq.push(i);if(playerSeq.length===simonSeq.length){inputEnabled=false;simonLevel++;document.getElementById('p-level').innerText=simonLevel;document.getElementById('p-status').innerText="Good! Next...";setTimeout(startSimonRound,1000);}}else{inputEnabled=false;document.getElementById('p-status').innerText="GAME OVER!";b.classList.add('fail');setTimeout(initPixelGame,2000);}}
        function clearPixels(){for(let i=0;i<9;i++){const b=document.getElementById(`px-${i}`);b.classList.remove('lit');b.classList.remove('fail');}}

        // GOLF (Same logic)
        let gfBall=90,gfHole=9,gfStrokes=0,gfAngle=45,gfPower=0,gfCharging=false,gfPowerTimer=null,gfInAir=false;
        function initGolfGame(){gfBall=90;gfHole=9;gfStrokes=0;gfAngle=45;gfInAir=false;updateGolfUI();renderGolfGrid();}
        function renderGolfGrid(){for(let i=0;i<100;i++){const t=document.getElementById(`gf-${i}`);t.className='tile grass';t.innerHTML='';if([44,45,54,55].includes(i))t.className='tile water';if([22,28,82].includes(i))t.className='tile sand';}const h=document.getElementById(`gf-${gfHole}`);h.className='tile hole';h.innerHTML='⛳️';const b=document.getElementById(`gf-${Math.floor(gfBall)}`);if(b){b.classList.add('ball');b.innerHTML='⚪️';}}
        function updateGolfUI(){document.getElementById('gf-strokes').innerText=gfStrokes;document.getElementById('gf-angle').innerText=gfAngle;}
        function changeGolfAngle(d){gfAngle=(gfAngle+d+360)%360;updateGolfUI();}
        function startSwing(){if(gfInAir||gfCharging)return;gfCharging=true;gfPower=0;const f=document.getElementById('gf-power-fill');gfPowerTimer=setInterval(()=>{gfPower+=5;if(gfPower>100)gfPower=0;f.style.width=gfPower+'%';},30);}
        function releaseSwing(){if(!gfCharging)return;clearInterval(gfPowerTimer);gfCharging=false;gfInAir=true;gfStrokes++;updateGolfUI();const r=gfAngle*(Math.PI/180),d=(gfPower/100)*8,sx=gfBall%10,sy=Math.floor(gfBall/10),vx=Math.cos(r)*d,vy=-Math.sin(r)*d;let dx=Math.round(sx+vx),dy=Math.round(sy+vy);dx=Math.max(0,Math.min(9,dx));dy=Math.max(0,Math.min(9,dy));const di=dy*10+dx;document.getElementById('gf-msg').innerText="Flying...";setTimeout(()=>{gfBall=di;renderGolfGrid();gfInAir=false;if(gfBall===gfHole)document.getElementById('gf-msg').innerText="HOLE IN ONE! 🎉";else{const t=document.getElementById(`gf-${gfBall}`);if(t.classList.contains('water')){document.getElementById('gf-msg').innerText="SPLASH! 💦";gfStrokes++;updateGolfUI();}else if(t.classList.contains('sand'))document.getElementById('gf-msg').innerText="Bunker...";else document.getElementById('gf-msg').innerText="";}},1000);}

        // --- INPUT HANDLER ---
        document.addEventListener('keydown', (e) => {
            const k = e.key;
            if (k === 'F1' || k === 'SoftLeft') { handleLeftKey(); e.preventDefault(); return; }
            if (k === 'F2' || k === 'SoftRight') { handleRightKey(); e.preventDefault(); return; }
            
            // GRID NAVIGATION (Home or Games)
            if (currentView === 'home' || currentView === 'games') {
                const apps = getActiveGridApps();
                const data = currentView === 'home' ? MAIN_APPS : GAME_APPS;

                if (k >= '1' && k <= '9' && document.activeElement !== omni) {
                    const idx = parseInt(k) - 1;
                    if (data[idx]) {
                        if(data[idx].isInternal) openApp(data[idx].id);
                        else window.location = data[idx].url;
                    } return;
                }
                if (k === 'ArrowDown') { if (focusIdx === -1 && currentView==='home') setFocus(0); else if (focusIdx + cols < apps.length) setFocus(focusIdx + cols); e.preventDefault(); } 
                else if (k === 'ArrowUp') { if (focusIdx < cols && currentView==='home') setFocus(-1); else setFocus(focusIdx - cols); e.preventDefault(); }
                else if (k === 'ArrowRight') { if ((focusIdx + 1) % cols !== 0 && focusIdx + 1 < apps.length) setFocus(focusIdx + 1); e.preventDefault(); }
                else if (k === 'ArrowLeft') { if (focusIdx % cols !== 0) setFocus(focusIdx - 1); e.preventDefault(); }
                else if (k === 'Enter') handleCenterKey();
            }
            // GAMES
            else if (currentView === 'calc') { if (k === 'Enter') handleCenterKey(); }
            else if (currentView === 'pixel') { if (k >= '1' && k <= '9') handlePixelInput(parseInt(k) - 1); }
            else if (currentView === 'golf') {
                if (k === 'ArrowLeft') { changeGolfAngle(15); e.preventDefault(); }
                else if (k === 'ArrowRight') { changeGolfAngle(-15); e.preventDefault(); }
                else if (k === 'Enter' || k === ' ') { if(!e.repeat) startSwing(); e.preventDefault(); }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' || e.key === ' ') handleCenterKeyRelease();
        });

        init();
    </script>
</body>
</html>
