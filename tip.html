<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - Tip</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
    <style>
        :root { --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333; --font: 'Courier New', monospace; }
        body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .status-bar { height:24px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; }
        
        .view { flex-grow:1; display:flex; flex-direction:column; padding:10px; }
        
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .label { width: 80px; font-weight: bold; }
        input { flex-grow: 1; background: #222; border: 1px solid #444; color: #fff; padding: 8px; font-family: inherit; font-size: 16px; border-radius: 4px; text-align: right; }
        
        .btn-grp { display: flex; gap: 5px; margin-bottom: 20px; }
        .btn { flex: 1; text-align: center; padding: 8px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .btn.active { background: var(--highlight); color: #000; font-weight: bold; }
        
        .result-box { border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; text-align: right; }
        .big-val { font-size: 32px; font-weight: bold; color: var(--highlight); }
        .sub-val { font-size: 12px; color: #888; }

        .soft-keys { height:30px; background:#111; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; text-transform:uppercase; font-weight:bold; }
        .soft-key { width:33%; text-align:center; cursor:pointer; }
    </style>
</head>
<body>
    <div class="status-bar"><span>Tip Calc</span><span id="clock">--:--</span></div>

    <div class="view">
        <div class="row">
            <span class="label">Bill</span>
            <input type="number" id="bill" value="0.00" oninput="calc()">
        </div>
        
        <div class="btn-grp">
            <div id="p15" class="btn" onclick="setPct(15)">15%</div>
            <div id="p18" class="btn active" onclick="setPct(18)">18%</div>
            <div id="p20" class="btn" onclick="setPct(20)">20%</div>
        </div>
        
        <div class="row">
            <span class="label">Split</span>
            <input type="number" id="split" value="1" min="1" oninput="calc()">
        </div>
        
        <div class="result-box">
            <div class="sub-val">Total: <span id="total">$0.00</span></div>
            <div class="big-val" id="per-person">$0.00</div>
            <div class="sub-val">per person</div>
        </div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left" onclick="cyclePct()">Tip %</div>
        <div class="soft-key center" onclick="calc()">CALC</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        let pct = 18;

        function init() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
            document.getElementById('bill').focus();
        }

        function setPct(p) {
            pct = p;
            document.querySelectorAll('.btn').forEach(b => b.className = 'btn');
            document.getElementById('p' + p).className = 'btn active';
            calc();
        }

        function cyclePct() {
            const opts = [15, 18, 20];
            const idx = opts.indexOf(pct);
            setPct(opts[(idx + 1) % 3]);
        }

        function calc() {
            const bill = parseFloat(document.getElementById('bill').value) || 0;
            const split = parseInt(document.getElementById('split').value) || 1;
            
            const tip = bill * (pct / 100);
            const total = bill + tip;
            const per = total / split;
            
            document.getElementById('total').innerText = '$' + total.toFixed(2);
            document.getElementById('per-person').innerText = '$' + per.toFixed(2);
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'F1') cyclePct();
            if(e.key === 'F2') history.back();
            if(e.key === 'Enter') calc();
        });

        init();
    </script>
</body>
</html>
