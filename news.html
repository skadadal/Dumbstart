<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - News</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    <style>
        :root { --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333; --font: 'Courier New', monospace; }
        body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .status-bar { height:24px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; }
        
        .view { flex-grow:1; overflow-y:auto; padding:5px; }
        
        .news-item {
            display: block; padding: 10px; border-bottom: 1px solid #333;
            text-decoration: none; color: inherit;
        }
        .news-item:focus, .news-item:hover { background: var(--select); border-left: 3px solid var(--highlight); outline: none; }
        .news-title { font-weight: bold; margin-bottom: 4px; display: block; }
        .news-meta { font-size: 10px; color: #888; }
        
        .loading { text-align: center; padding: 20px; color: #888; }

        .soft-keys { height:30px; background:#111; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; text-transform:uppercase; font-weight:bold; }
        .soft-key { width:33%; text-align:center; cursor:pointer; }
    </style>
</head>
<body>
    <div class="status-bar"><span>News (HN)</span><span id="clock">--:--</span></div>

    <div class="view" id="news-list">
        <div class="loading" id="loader">Fetching Stories...</div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left" onclick="fetchNews()">Reload</div>
        <div class="soft-key center" onclick="openStory()">READ</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        function init() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
            fetchNews();
        }

        function fetchNews() {
            const list = document.getElementById('news-list');
            list.innerHTML = '<div class="loading">Fetching...</div>';

            // Hacker News API (Top Stories)
            fetch('https://hacker-news.firebaseio.com/v0/topstories.json')
                .then(res => res.json())
                .then(ids => {
                    const top10 = ids.slice(0, 10);
                    list.innerHTML = '';
                    top10.forEach(id => fetchStory(id));
                })
                .catch(err => {
                    list.innerHTML = '<div class="loading">Error loading news.</div>';
                });
        }

        function fetchStory(id) {
            fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`)
                .then(res => res.json())
                .then(story => {
                    if(!story) return;
                    const el = document.createElement('a');
                    el.className = 'news-item';
                    el.href = story.url || `https://news.ycombinator.com/item?id=${story.id}`;
                    el.tabIndex = 0;
                    el.innerHTML = `
                        <span class="news-title">${story.title}</span>
                        <span class="news-meta">▲ ${story.score} | by ${story.by}</span>
                    `;
                    document.getElementById('news-list').appendChild(el);
                });
        }

        function openStory() {
            const active = document.activeElement;
            if(active && active.classList.contains('news-item')) {
                active.click();
            }
        }

        // Navigation Key Handler
        document.addEventListener('keydown', (e) => {
            if(e.key === 'F1') fetchNews();
            if(e.key === 'F2') history.back();
            
            // Allow Arrow Keys to navigate links naturally
            if(e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                // Default behavior handles focus nicely for <a> tags
            }
            if(e.key === 'Enter') openStory();
        });

        init();
    </script>
</body>
</html>
