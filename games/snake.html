<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - Snake</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
    <style>
        :root {
            --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333;
            --font: 'Courier New', monospace; --status-h: 18px; --soft-h: 24px;
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--fg);
            font-family: var(--font); font-size: 11px;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; user-select: none; touch-action: none;
        }
        .status-bar {
            height: var(--status-h); background: #111; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px; font-size: 10px;
        }
        .view {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #game-board {
            border: 2px solid var(--highlight);
            background: #111;
            image-rendering: pixelated;
        }
        .score-box { font-size: 14px; margin-bottom: 5px; }
        .soft-keys {
            height: var(--soft-h); background: #111; border-top: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px; font-size: 10px; text-transform: uppercase;
        }
        .soft-key { width: 33%; text-align: center; cursor: pointer; }
        .msg { position: absolute; background: #000; padding: 10px; border: 1px solid var(--highlight); display: none; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>Snake</span>
        <span id="clock">--:--</span>
    </div>

    <div class="view">
        <div class="score-box">Score: <span id="score">0</span></div>
        <canvas id="game-board" width="200" height="200"></canvas>
        <div id="msg" class="msg">GAME OVER<br>Press Select</div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left" onclick="togglePause()">Pause</div>
        <div class="soft-key center" onclick="handleSelect()">SELECT</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const gridSize = 10;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let nextDx = 0; // Buffer input
        let nextDy = 0;
        let gameLoop;
        let isPaused = false;
        let isGameOver = false;

        function init() {
            document.addEventListener('keydown', handleInput);
            resetGame();
            setInterval(updateClock, 1000);
            updateClock();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            score = 0;
            dx = 1; dy = 0;
            nextDx = 1; nextDy = 0;
            isGameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('msg').style.display = 'none';
            placeFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Check collision with snake
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) placeFood();
            });
        }

        function draw() {
            if(isPaused || isGameOver) return;

            // Move
            dx = nextDx; dy = nextDy;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wrap walls (Nokia style) or Die? Let's wrap for now.
            if(head.x < 0) head.x = tileCount - 1;
            if(head.x >= tileCount) head.x = 0;
            if(head.y < 0) head.y = tileCount - 1;
            if(head.y >= tileCount) head.y = 0;

            // Check self collision
            snake.forEach(part => {
                if(part.x === head.x && part.y === head.y) gameOver();
            });
            if(isGameOver) return;

            snake.unshift(head);

            // Eat Food
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            // Draw Background
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = '#ff0000'; // Red Apple
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-1, gridSize-1);

            // Draw Snake
            ctx.fillStyle = '#0f0'; // Green Snake
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize-1, gridSize-1);
            });
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('msg').style.display = 'block';
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        function handleSelect() {
            if(isGameOver) resetGame();
            else togglePause();
        }

        function handleInput(e) {
            const k = e.key;
            // Prevent reversing
            if(k === 'ArrowUp' && dy === 0) { nextDx = 0; nextDy = -1; e.preventDefault(); }
            if(k === 'ArrowDown' && dy === 0) { nextDx = 0; nextDy = 1; e.preventDefault(); }
            if(k === 'ArrowLeft' && dx === 0) { nextDx = -1; nextDy = 0; e.preventDefault(); }
            if(k === 'ArrowRight' && dx === 0) { nextDx = 1; nextDy = 0; e.preventDefault(); }
            
            // Numpad (2,4,6,8)
            if(k === '2' && dy === 0) { nextDx = 0; nextDy = 1; }
            if(k === '8' && dy === 0) { nextDx = 0; nextDy = -1; }
            if(k === '4' && dx === 0) { nextDx = -1; nextDy = 0; }
            if(k === '6' && dx === 0) { nextDx = 1; nextDy = 0; }

            if(k === 'Enter' || k === ' ') handleSelect();
            if(k === 'F1' || k === 'SoftLeft') togglePause();
            if(k === 'F2' || k === 'SoftRight') history.back();
        }

        // Touch Controls (Simple Tap Zones)
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            const touchY = e.touches[0].clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const diffX = touchX - centerX;
            const diffY = touchY - centerY;

            if(Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal
                if(diffX > 0 && dx === 0) { nextDx = 1; nextDy = 0; } // Right
                else if(dx === 0) { nextDx = -1; nextDy = 0; } // Left
            } else {
                // Vertical
                if(diffY > 0 && dy === 0) { nextDx = 0; nextDy = 1; } // Down
                else if(dy === 0) { nextDx = 0; nextDy = -1; } // Up
            }
            e.preventDefault();
        }, {passive: false});

        init();
    </script>
</body>
</html>
