<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - Settings</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
    <style>
        :root { --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333; --font: 'Courier New', monospace; }
        body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .status-bar { height:24px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; }
        
        .view { flex-grow:1; overflow-y:auto; padding:5px; }
        
        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 8px; border-bottom: 1px solid #333; cursor: pointer;
        }
        .setting-item.active { background: var(--select); border-left: 3px solid var(--highlight); }
        
        .label { font-weight: bold; }
        .value { color: var(--highlight); }
        
        .header { margin: 10px 5px; font-size: 12px; color: #888; text-transform: uppercase; border-bottom: 1px solid #444; }

        .soft-keys { height:30px; background:#111; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; text-transform:uppercase; font-weight:bold; }
        .soft-key { width:33%; text-align:center; cursor:pointer; }
    </style>
</head>
<body>
    <div class="status-bar"><span>Settings</span><span id="clock">--:--</span></div>

    <div class="view" id="list">
        <div class="header">Appearance</div>
        <div class="setting-item" tabindex="1" onclick="cycleTheme()">
            <span class="label">Theme</span>
            <span class="value" id="val-theme">Default</span>
        </div>
        
        <div class="header">System</div>
        <div class="setting-item" tabindex="2" onclick="cycleClock()">
            <span class="label">Clock Format</span>
            <span class="value" id="val-clock">12h</span>
        </div>
        <div class="setting-item" tabindex="3" onclick="resetData()">
            <span class="label">Reset Data</span>
            <span class="value" style="color:red">>>></span>
        </div>
        
        <div class="header">Info</div>
        <div class="setting-item" tabindex="4">
            <span class="label">Version</span>
            <span class="value" style="color:#888">v12.0</span>
        </div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left"></div>
        <div class="soft-key center" onclick="handleSelect()">CHANGE</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        const THEMES = ['default', 'red', 'green', 'amber', 'blue'];
        let currentTheme = localStorage.getItem('dumbos-theme') || 'default';
        let clock24 = localStorage.getItem('dumbos-clock24') === 'true';

        function init() {
            updateUI();
            setInterval(updateClock, 1000);
            updateClock();
            
            // Focus first item
            document.querySelector('.setting-item').focus();
            document.querySelector('.setting-item').classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            const opts = {hour:'2-digit', minute:'2-digit', hour12: !clock24};
            document.getElementById('clock').textContent = now.toLocaleTimeString([], opts);
        }

        function updateUI() {
            document.getElementById('val-theme').innerText = currentTheme.toUpperCase();
            document.getElementById('val-clock').innerText = clock24 ? "24h" : "12h";
            document.body.className = currentTheme;
        }

        function cycleTheme() {
            let idx = THEMES.indexOf(currentTheme);
            idx = (idx + 1) % THEMES.length;
            currentTheme = THEMES[idx];
            localStorage.setItem('dumbos-theme', currentTheme);
            updateUI();
        }

        function cycleClock() {
            clock24 = !clock24;
            localStorage.setItem('dumbos-clock24', clock24);
            updateUI();
            updateClock();
        }

        function resetData() {
            if(confirm("Clear ALL data (Notes, High Scores)?")) {
                localStorage.clear();
                alert("Reset complete. Reloading...");
                location.reload();
            }
        }

        // Navigation
        const items = document.querySelectorAll('.setting-item');
        let idx = 0;

        function setFocus(i) {
            items[idx].classList.remove('active');
            idx = i;
            if(idx < 0) idx = items.length - 1;
            if(idx >= items.length) idx = 0;
            items[idx].classList.add('active');
            items[idx].focus();
        }

        function handleSelect() {
            items[idx].click();
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowDown') setFocus(idx + 1);
            if(e.key === 'ArrowUp') setFocus(idx - 1);
            if(e.key === 'Enter') handleSelect();
            if(e.key === 'F2') history.back();
        });

        init();
    </script>
</body>
</html>
