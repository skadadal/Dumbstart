<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS v4</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📟</text></svg>">
</head>
<body class="theme-default">

    <!-- Status Bar (Always Visible) -->
    <div class="status-bar">
        <span id="carrier">DumbOS</span>
        <div class="status-right">
            <span id="battery">🔋??%</span>
            <span id="clock" class="bold">--:--</span>
        </div>
    </div>

    <!-- Main View (App Grid) -->
    <div id="view-home" class="view active">
        
        <!-- Quick Search (Type here directly) -->
        <div class="search-box">
            <input type="text" id="omni-box" placeholder="Search..." tabindex="0">
        </div>

        <div class="grid" id="app-grid">
            <!-- Apps injected by JS -->
        </div>
    </div>

    <!-- Soft Keys (Bottom Toolbar) -->
    <div class="soft-keys">
        <div class="soft-key left" id="sk-left">Options</div>
        <div class="soft-key center" id="sk-center">SELECT</div>
        <div class="soft-key right" id="sk-right">Back</div>
    </div>

    <!-- Options Menu (Popup) -->
    <div id="options-menu" class="popup hidden">
        <div class="popup-title">Options</div>
        <div class="menu-list">
            <div class="menu-item" data-action="theme">🎨 Change Theme</div>
            <div class="menu-item" data-action="edit">✏️ Edit Apps (Soon)</div>
            <div class="menu-item" data-action="about">ℹ️ About</div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
