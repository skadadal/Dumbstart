<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS v5 (CalcGame)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📟</text></svg>">
    <style>
        :root {
            --bg: #000;
            --fg: #e0e0e0;
            --highlight: #0f0;
            --select: #333;
            --font: 'Courier New', monospace;
            --status-h: 18px;
            --soft-h: 24px;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg); color: var(--fg);
            font-family: var(--font);
            font-size: 11px;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: pan-y;
        }

        /* Themes */
        body.red { --highlight: #ff0000; --select: #500; --bg: #200; }
        body.green { --highlight: #00ff00; --select: #050; --bg: #020; }
        body.amber { --highlight: #ffaa00; --select: #530; --bg: #210; }
        body.blue { --highlight: #00ccff; --select: #003; --bg: #001; }

        /* Status Bar */
        .status-bar {
            height: var(--status-h);
            background: #111;
            border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
            font-size: 10px;
        }
        .bold { font-weight: bold; }

        /* Main View */
        .view {
            flex-grow: 1;
            overflow-y: auto; /* Scrollable grid */
            padding: 4px;
            display: none; /* Hide non-active views */
        }
        .view.active { display: block; }

        /* Search Box */
        .search-box {
            margin-bottom: 5px;
            padding: 2px;
        }
        #omni-box {
            width: 96%;
            background: #222; border: 1px solid #444; color: #fff;
            font-family: inherit; font-size: 12px; padding: 2px 4px;
            border-radius: 4px;
        }
        #omni-box:focus { border-color: var(--highlight); outline: none; background: #000; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .app {
            display: flex; flex-direction: column; align-items: center;
            padding: 6px 2px;
            border: 1px solid transparent;
            text-decoration: none; color: inherit;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .app.active, .app:focus {
            background: var(--select);
            border-color: var(--highlight);
            color: #fff; outline: none;
        }
        .app-num {
            position: absolute; top: 1px; left: 1px;
            font-size: 8px; opacity: 0.5;
        }
        .icon { font-size: 20px; margin-bottom: 2px; }
        .name { font-size: 10px; text-align: center; white-space: nowrap; overflow: hidden; max-width: 100%; }

        /* Soft Keys (Toolbar) */
        .soft-keys {
            height: var(--soft-h);
            background: #111;
            border-top: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
            font-size: 10px;
            text-transform: uppercase;
        }
        .soft-key { width: 33%; text-align: center; cursor: pointer; }
        .left { text-align: left; }
        .right { text-align: right; }
        .center { font-weight: bold; }

        /* Popups */
        .popup {
            position: absolute; bottom: var(--soft-h); left: 0; right: 0;
            background: #222; border-top: 2px solid var(--highlight);
            z-index: 100;
        }
        .popup-title {
            background: var(--highlight); color: #000;
            padding: 2px 5px; font-weight: bold; text-align: center;
        }
        .menu-list { padding: 5px; }
        .menu-item { padding: 8px 5px; border-bottom: 1px solid #444; cursor: pointer; }
        .menu-item:hover, .menu-item.active { background: var(--select); color: #fff; }
        .hidden { display: none !important; }

        /* --- GAME STYLES --- */
        #view-game { text-align: center; padding-top: 20px; }
        .game-display {
            font-size: 24px; font-weight: bold; margin-bottom: 20px;
            border: 2px solid var(--highlight); padding: 10px;
            background: #111;
        }
        .game-input {
            width: 80%; background: #222; border: 1px solid #555;
            color: #fff; font-size: 18px; padding: 5px; text-align: center;
        }
        .game-score { font-size: 12px; margin-bottom: 10px; opacity: 0.7; }
        .game-msg { color: var(--highlight); height: 20px; margin-top: 10px; }

    </style>
</head>
<body class="theme-default">

    <!-- Status Bar (Always Visible) -->
    <div class="status-bar">
        <span id="carrier">Hi Gulliklckson!</span>
        <div class="status-right">
            <span id="battery">🔋??%</span>
            <span id="clock" class="bold">--:--</span>
        </div>
    </div>

    <!-- VIEW 1: HOME (App Grid) -->
    <div id="view-home" class="view active">
        <div class="search-box">
            <input type="text" id="omni-box" placeholder="Search..." tabindex="0">
        </div>
        <div class="grid" id="app-grid">
            <!-- Apps injected by JS -->
        </div>
    </div>

    <!-- VIEW 2: CALC GAME -->
    <div id="view-game" class="view">
        <div class="game-score">Score: <span id="g-score">0</span></div>
        <div class="game-display" id="g-problem">READY?</div>
        <input type="tel" id="g-input" class="game-input" placeholder="?">
        <div class="game-msg" id="g-msg"></div>
    </div>

    <!-- Soft Keys -->
    <div class="soft-keys">
        <div class="soft-key left" id="sk-left" onclick="handleLeftKey()">Options</div>
        <div class="soft-key center" id="sk-center" onclick="handleCenterKey()">SELECT</div>
        <div class="soft-key right" id="sk-right" onclick="handleRightKey()">Back</div>
    </div>

    <!-- Options Menu -->
    <div id="options-menu" class="popup hidden">
        <div class="popup-title">Options</div>
        <div class="menu-list">
            <div class="menu-item" onclick="cycleTheme()">🎨 Change Theme</div>
            <div class="menu-item" onclick="toggleOptions()">❌ Close Menu</div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const APPS = [
            { id: "calcgame", icon: "🧮", name: "CalcGame", isInternal: true }, // NEW GAME
            { url: "http://frogfind.com", icon: "🐸", name: "FrogFind" },
            { url: "https://lite.duckduckgo.com/lite", icon: "🦆", name: "DDG Lite" },
            { url: "https://wiby.me", icon: "🕸️", name: "Wiby" },
            { url: "https://old.reddit.com", icon: "👽", name: "Reddit" },
            { url: "https://news.ycombinator.com", icon: "👾", name: "HackerN" },
            { url: "https://mbasic.facebook.com", icon: "👥", name: "FB Basic" },
            { url: "https://mobile.twitter.com", icon: "🐦", name: "Twitter" },
            { url: "https://text.npr.org", icon: "📰", name: "NPR Txt" },
            { url: "https://lite.cnn.com", icon: "🗞️", name: "CNN Lite" },
            { url: "https://wttr.in", icon: "☁️", name: "Weather" },
            { url: "https://en.m.wikipedia.org", icon: "📚", name: "Wiki" },
            { url: "https://maps.google.com", icon: "🗺️", name: "Maps" },
            { url: "https://translate.google.com/m", icon: "🈯", name: "Translat" },
            { url: "https://gmail.com", icon: "✉️", name: "Gmail" },
            { url: "https://github.com", icon: "🐙", name: "GitHub" }
        ];

        const THEMES = ['default', 'red', 'green', 'amber', 'blue'];
        let currentTheme = localStorage.getItem('dumbos-theme') || 'default';
        document.body.className = currentTheme;

        // --- DOM ---
        const grid = document.getElementById('app-grid');
        const omni = document.getElementById('omni-box');
        const optionsMenu = document.getElementById('options-menu');
        
        // Views
        const views = {
            home: document.getElementById('view-home'),
            game: document.getElementById('view-game')
        };
        let currentView = 'home';

        // --- INIT ---
        function init() {
            // Build Grid
            APPS.forEach((app, i) => {
                const el = document.createElement('a');
                if(!app.isInternal) el.href = app.url;
                else el.onclick = () => openApp(app.id); // Internal App Handler
                
                el.className = 'app';
                el.tabIndex = i + 1; 
                el.innerHTML = `
                    <span class="app-num">${i+1}</span>
                    <span class="icon">${app.icon}</span>
                    <span class="name">${app.name}</span>
                `;
                grid.appendChild(el);
            });

            updateTime();
            setInterval(updateTime, 1000);
            setFocus(-1);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        // --- NAVIGATION ---
        let focusIdx = -1; 
        let appsNodeList = [];
        const cols = 3;

        function getApps() {
            if (appsNodeList.length === 0) appsNodeList = document.querySelectorAll('.app');
            return appsNodeList;
        }

        function setFocus(idx) {
            if(currentView !== 'home') return;
            const apps = getApps();
            apps.forEach(a => a.classList.remove('active'));
            omni.blur();

            if (idx < 0) {
                focusIdx = -1;
                omni.focus();
                updateSoftKeys("Options", "SEARCH", "Back");
            } else {
                focusIdx = idx;
                if(apps[focusIdx]) {
                    apps[focusIdx].classList.add('active');
                    apps[focusIdx].focus();
                    updateSoftKeys("Options", "OPEN", "Back");
                }
            }
        }

        function updateSoftKeys(left, center, right) {
            document.getElementById('sk-left').textContent = left;
            document.getElementById('sk-center').textContent = center;
            document.getElementById('sk-right').textContent = right;
        }

        function switchView(viewName) {
            // Hide all
            Object.values(views).forEach(v => v.classList.remove('active'));
            // Show new
            views[viewName].classList.add('active');
            currentView = viewName;

            if(viewName === 'home') {
                updateSoftKeys("Options", "OPEN", "Back");
                setFocus(focusIdx);
            } else if (viewName === 'game') {
                updateSoftKeys("Reset", "SUBMIT", "Quit");
                initGame();
            }
        }

        function openApp(id) {
            if (id === 'calcgame') switchView('game');
        }

        // --- ACTIONS ---
        function handleLeftKey() {
            if (currentView === 'home') toggleOptions();
            else if (currentView === 'game') initGame(); // Reset
        }

        function handleCenterKey() {
            if (currentView === 'home') {
                if (focusIdx === -1) {
                    if(omni.value.trim() !== "") window.location = `https://www.google.com/search?q=${encodeURIComponent(omni.value)}`;
                } else {
                    const apps = getApps();
                    if(apps[focusIdx]) {
                        if(APPS[focusIdx].isInternal) openApp(APPS[focusIdx].id);
                        else window.location = apps[focusIdx].href;
                    }
                }
            } else if (currentView === 'game') {
                checkAnswer();
            }
        }

        function handleRightKey() {
            if (currentView === 'game') switchView('home');
            else history.back();
        }

        function toggleOptions() {
            optionsMenu.classList.toggle('hidden');
        }

        function cycleTheme() {
            let idx = THEMES.indexOf(currentTheme);
            idx = (idx + 1) % THEMES.length;
            currentTheme = THEMES[idx];
            document.body.className = currentTheme;
            localStorage.setItem('dumbos-theme', currentTheme);
        }

        // --- CALC GAME LOGIC ---
        let gScore = 0;
        let gAnswer = 0;
        
        function initGame() {
            gScore = 0;
            document.getElementById('g-score').innerText = gScore;
            document.getElementById('g-msg').innerText = "";
            nextProblem();
            document.getElementById('g-input').focus();
        }

        function nextProblem() {
            const op = Math.random() > 0.5 ? '+' : '-';
            const a = Math.floor(Math.random() * 20) + 1; // 1-20
            const b = Math.floor(Math.random() * 20) + 1;
            
            // Avoid negative answers for simplicity
            let n1 = a, n2 = b;
            if (op === '-' && a < b) { n1 = b; n2 = a; }

            gAnswer = (op === '+') ? n1 + n2 : n1 - n2;
            document.getElementById('g-problem').innerText = `${n1} ${op} ${n2} = ?`;
            document.getElementById('g-input').value = "";
        }

        function checkAnswer() {
            const input = document.getElementById('g-input');
            const val = parseInt(input.value);
            const msg = document.getElementById('g-msg');

            if (val === gAnswer) {
                gScore += 10;
                msg.innerText = "CORRECT! +10";
                msg.style.color = "var(--highlight)";
                document.getElementById('g-score').innerText = gScore;
                setTimeout(() => {
                    msg.innerText = "";
                    nextProblem();
                }, 500);
            } else {
                gScore = Math.max(0, gScore - 5);
                msg.innerText = "WRONG! -5";
                msg.style.color = "red";
                document.getElementById('g-score').innerText = gScore;
            }
            input.focus();
        }

        // --- INPUT HANDLER ---
        document.addEventListener('keydown', (e) => {
            const k = e.key;
            
            if (currentView === 'home') {
                const apps = getApps();
                if (k >= '1' && k <= '9' && document.activeElement !== omni) {
                    const idx = parseInt(k) - 1;
                    if (apps[idx]) {
                        if(APPS[idx].isInternal) openApp(APPS[idx].id);
                        else window.location = apps[idx].href;
                    }
                    return;
                }
                if (k === 'ArrowDown') {
                    if (focusIdx === -1) setFocus(0);
                    else if (focusIdx + cols < apps.length) setFocus(focusIdx + cols);
                    e.preventDefault();
                } 
                else if (k === 'ArrowUp') {
                    if (focusIdx < cols) setFocus(-1);
                    else setFocus(focusIdx - cols);
                    e.preventDefault();
                }
                else if (k === 'ArrowRight') {
                    if (focusIdx !== -1 && (focusIdx + 1) % cols !== 0 && focusIdx + 1 < apps.length) setFocus(focusIdx + 1);
                    e.preventDefault();
                }
                else if (k === 'ArrowLeft') {
                    if (focusIdx !== -1 && focusIdx % cols !== 0) setFocus(focusIdx - 1);
                    e.preventDefault();
                }
            } else if (currentView === 'game') {
                // Allow typing numbers
                if (k === 'Enter') handleCenterKey();
            }

            // Global Keys
            if (k === 'Enter' && currentView === 'home') handleCenterKey();
            else if (k === 'F1' || k === 'SoftLeft') { handleLeftKey(); e.preventDefault(); }
            else if (k === 'F2' || k === 'SoftRight') { handleRightKey(); e.preventDefault(); }
        });

        // Run Init
        init();
    </script>
</body>
</html>
