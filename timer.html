<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - Timer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
    <style>
        :root { --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333; --font: 'Courier New', monospace; }
        body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .status-bar { height:24px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; }
        
        .view { flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { padding: 5px 10px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background: var(--highlight); color: #000; font-weight: bold; }
        
        .display { font-size: 48px; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; }
        
        .soft-keys { height:30px; background:#111; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; text-transform:uppercase; font-weight:bold; }
        .soft-key { width:33%; text-align:center; cursor:pointer; }
        
        input { background: #222; border: 1px solid #444; color: #fff; font-size: 24px; width: 60px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="status-bar"><span>Timer</span><span id="clock">--:--</span></div>

    <div class="view">
        <div class="mode-switch">
            <div id="btn-sw" class="mode-btn active" onclick="setMode('stopwatch')">Stopwatch</div>
            <div id="btn-tm" class="mode-btn" onclick="setMode('timer')">Timer</div>
        </div>
        
        <div class="display" id="display">00:00.0</div>
        <input type="number" id="input-min" placeholder="Min" value="5">
        
        <div class="status-text" id="status" style="color:#888; height:20px;">Stopped</div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left" onclick="reset()">Reset</div>
        <div class="soft-key center" onclick="toggle()">START</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        let mode = 'stopwatch'; // stopwatch | timer
        let running = false;
        let startTime = 0;
        let elapsedTime = 0;
        let timerDuration = 5 * 60 * 1000; // 5 min default
        let interval = null;

        function init() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        }

        function setMode(m) {
            if(running) toggle(); // Stop if running
            mode = m;
            reset();
            
            document.getElementById('btn-sw').className = mode === 'stopwatch' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('btn-tm').className = mode === 'timer' ? 'mode-btn active' : 'mode-btn';
            
            if(mode === 'timer') {
                document.getElementById('input-min').style.display = 'block';
                document.getElementById('display').style.display = 'none';
            } else {
                document.getElementById('input-min').style.display = 'none';
                document.getElementById('display').style.display = 'block';
            }
        }

        function toggle() {
            if(running) {
                // STOP
                running = false;
                clearInterval(interval);
                document.querySelector('.soft-key.center').innerText = "START";
                document.getElementById('status').innerText = "Paused";
            } else {
                // START
                running = true;
                document.querySelector('.soft-key.center').innerText = "STOP";
                document.getElementById('status').innerText = "Running...";
                
                if(mode === 'timer') {
                    // Parse input if starting fresh
                    if(elapsedTime === 0) {
                        const mins = parseInt(document.getElementById('input-min').value) || 5;
                        timerDuration = mins * 60 * 1000;
                        document.getElementById('input-min').style.display = 'none';
                        document.getElementById('display').style.display = 'block';
                    }
                    startTime = Date.now() + (timerDuration - elapsedTime); // Target time
                } else {
                    startTime = Date.now() - elapsedTime;
                }
                
                interval = setInterval(tick, 50);
            }
        }

        function tick() {
            const now = Date.now();
            if(mode === 'stopwatch') {
                elapsedTime = now - startTime;
                updateDisplay(elapsedTime);
            } else {
                const left = startTime - now;
                if(left <= 0) {
                    // Timer Done
                    elapsedTime = timerDuration;
                    updateDisplay(0);
                    toggle(); // Stop
                    document.getElementById('status').innerText = "DONE! 🔔";
                    document.getElementById('status').style.color = "var(--highlight)";
                    // Beep? navigator.vibrate(200);
                } else {
                    elapsedTime = timerDuration - left;
                    updateDisplay(left);
                }
            }
        }

        function updateDisplay(ms) {
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const s = (totalSec % 60).toString().padStart(2, '0');
            const dec = Math.floor((ms % 1000) / 100);
            document.getElementById('display').innerText = `${m}:${s}.${dec}`;
        }

        function reset() {
            if(running) toggle();
            elapsedTime = 0;
            updateDisplay(0);
            document.getElementById('status').innerText = "Ready";
            document.getElementById('status').style.color = "#888";
            
            if(mode === 'timer') {
                updateDisplay(timerDuration); // Show set time
                document.getElementById('input-min').style.display = 'block';
                document.getElementById('display').style.display = 'none';
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' || e.key === ' ') toggle();
            if(e.key === 'F1') reset();
            if(e.key === 'F2') history.back();
            if(e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                setMode(mode === 'stopwatch' ? 'timer' : 'stopwatch');
            }
        });

        init();
    </script>
</body>
</html>
