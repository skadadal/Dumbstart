<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DumbOS - Chat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <style>
        :root { --bg: #000; --fg: #e0e0e0; --highlight: #0f0; --select: #333; --font: 'Courier New', monospace; }
        body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        .status-bar { height:24px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; }
        
        .view { flex-grow:1; display:flex; flex-direction:column; overflow:hidden; }
        .chat-log { flex-grow:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
        
        .msg { padding:8px 12px; border-radius:15px; max-width:80%; word-wrap:break-word; font-size:13px; line-height:1.4; }
        .msg.bot { align-self:flex-start; background:#222; border:1px solid #444; color:#fff; border-bottom-left-radius:2px; }
        .msg.user { align-self:flex-end; background:var(--select); border:1px solid var(--highlight); color:#fff; border-bottom-right-radius:2px; }
        
        .input-area { height:40px; border-top:1px solid #333; display:flex; padding:5px; background:#111; }
        #input { flex-grow:1; background:#000; border:1px solid #444; color:#fff; padding:5px; font-family:inherit; border-radius:4px; outline:none; }
        #input:focus { border-color:var(--highlight); }
        
        .soft-keys { height:30px; background:#111; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; padding:0 5px; font-size:12px; text-transform:uppercase; font-weight:bold; }
        .soft-key { width:33%; text-align:center; cursor:pointer; }
    </style>
</head>
<body>
    <div class="status-bar"><span>ChatBot</span><span id="clock">--:--</span></div>

    <div class="view">
        <div class="chat-log" id="log">
            <div class="msg bot">Hello! I am DumbBot. 🤖</div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Say something...">
        </div>
    </div>

    <div class="soft-keys">
        <div class="soft-key left" onclick="clearChat()">Clear</div>
        <div class="soft-key center" onclick="sendMsg()">SEND</div>
        <div class="soft-key right" onclick="history.back()">Back</div>
    </div>

    <script>
        const log = document.getElementById('log');
        const input = document.getElementById('input');

        function init() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
            input.focus();
        }

        function sendMsg() {
            const text = input.value.trim();
            if(!text) return;
            
            addMsg(text, 'user');
            input.value = '';
            input.focus();
            
            setTimeout(() => {
                const reply = getReply(text);
                addMsg(reply, 'bot');
            }, 600 + Math.random()*500); // Fake typing delay
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight; // Auto scroll
        }

        function getReply(text) {
            const lower = text.toLowerCase();
            if(lower.includes('hello') || lower.includes('hi')) return "Greetings, human! 👋";
            if(lower.includes('time')) return "It is " + new Date().toLocaleTimeString();
            if(lower.includes('joke')) return "Why did the developer go broke? Because he used up all his cache.";
            if(lower.includes('dumb')) return "I prefer 'minimalist'.";
            if(lower.includes('who are you')) return "I am DumbBot v1.0 running on your phone.";
            if(lower.includes('weather')) return "Check the Weather app! ☁️";
            
            const answers = [
                "Interesting.", "Tell me more.", "I see.", "Does not compute.", 
                "Ask again later.", "42.", "Systems nominal."
            ];
            return answers[Math.floor(Math.random() * answers.length)];
        }

        function clearChat() {
            log.innerHTML = '<div class="msg bot">Chat cleared. 🧹</div>';
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') sendMsg();
            if(e.key === 'F1') clearChat();
            if(e.key === 'F2') history.back();
        });

        init();
    </script>
</body>
</html>
